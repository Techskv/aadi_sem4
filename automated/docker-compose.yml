version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: eval_db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: evaluation_db
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: --default-authentication-plugin=mysql_native_password

  # Redis for caching and Celery
  redis:
    image: redis:7-alpine
    container_name: eval_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eval_backend
    environment:
      DATABASE_URL: mysql+pymysql://root:password@db:3306/evaluation_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-this-in-production
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eval_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: npm run dev -- --host

volumes:
  mysql_data:
  upload_data:
